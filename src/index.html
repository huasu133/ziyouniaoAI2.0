<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src http://127.0.0.1:18789;">
  <title>自由鸟AI</title>

  <!-- CSS: 5 files -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <!-- ─── 顶栏 ─────────────────────────────────────────── -->
  <header id="topbar">
    <div class="topbar-left">
      <button id="btn-sidebar-toggle" class="topbar-btn" title="切换侧栏">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span id="topbar-title" class="topbar-title">自由鸟AI</span>
    </div>
    <div class="topbar-center">
      <div id="tab-bar" class="tab-bar"></div>
    </div>
    <div class="topbar-right">
      <button id="btn-new-chat" class="topbar-btn" title="新建对话">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button id="btn-settings" class="topbar-btn" title="设置">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <button id="btn-gateway-status" class="topbar-btn topbar-status" title="网关状态">
        <span class="status-dot offline"></span>
      </button>
    </div>
  </header>

  <!-- ─── 主体 ─────────────────────────────────────────── -->
  <div id="app-body">
    <!-- 左侧栏: 会话列表 -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">会话历史</span>
        <button id="btn-clear-conversations" class="sidebar-action-btn" title="清空所有会话">清空</button>
      </div>
      <div id="conversation-list" class="conversation-list"></div>
    </aside>

    <!-- 中间聊天区 -->
    <main id="chat-area" class="chat-area">
      <div id="messages-container" class="messages-container">
        <div class="welcome-message" id="welcome-message">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="12" y1="8" x2="12" y2="14"/><line x1="9" y1="11" x2="15" y2="11"/></svg>
          </div>
          <h2>自由鸟AI 3.0</h2>
          <p class="welcome-hint">选择模型后开始对话</p>
          <div class="welcome-models">
            <button class="model-btn" data-model="deepseek-chat">DeepSeek Chat</button>
            <button class="model-btn" data-model="deepseek-reasoner">DeepSeek Reasoner</button>
          </div>
        </div>
      </div>

      <!-- 输入区 -->
      <div class="input-area" id="input-area">
        <div class="model-selector">
          <select id="model-select" class="model-select">
            <option value="deepseek-chat">DeepSeek Chat</option>
            <option value="deepseek-reasoner">DeepSeek Reasoner</option>
          </select>
          <select id="style-select" class="model-select">
            <option value="">默认风格</option>
            <option value="efficient">⚡高效</option>
            <option value="creative">🎨创意</option>
            <option value="professional">📋专业</option>
            <option value="friendly">💬友好</option>
          </select>
        </div>
        <div class="input-row">
          <textarea id="message-input" class="message-input" rows="1" placeholder="输入消息..." maxlength="50000" autofocus></textarea>
          <button id="btn-send" class="btn-send" title="发送 (Enter)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
          <button id="btn-stop" class="btn-stop hidden" title="停止生成">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
          </button>
        </div>
        <div class="input-footer">
          <span class="input-hint">Enter 发送 · Shift+Enter 换行</span>
          <button id="btn-web-search" class="btn-text" title="免费搜索">🔍 搜索</button>
          <span id="token-count" class="token-count"></span>
        </div>
      </div>
    </main>

    <!-- 右侧设置面板 -->
    <aside id="settings-panel" class="settings-panel settings-panel-collapsed">
      <div class="settings-header">
        <span class="settings-title">设置</span>
        <button id="btn-close-settings" class="settings-close-btn" title="关闭">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="settings-body">
        <!-- 外观 -->
        <div class="settings-section">
          <h3 class="settings-section-title">外观</h3>
          <div class="settings-item">
            <label class="settings-label">主题</label>
            <select id="setting-theme" class="settings-select">
              <option value="dark">深色</option>
              <option value="light">亮色</option>
            </select>
          </div>
          <div class="settings-item">
            <label class="settings-label">字体大小</label>
            <select id="setting-font-size" class="settings-select">
              <option value="small">小</option>
              <option value="medium" selected>中</option>
              <option value="large">大</option>
            </select>
          </div>
        </div>

        <!-- 对话 -->
        <div class="settings-section">
          <h3 class="settings-section-title">对话</h3>
          <div class="settings-item">
            <label class="settings-label">温度 (Temperature)</label>
            <input type="range" id="setting-temperature" class="settings-range" min="0" max="2" step="0.1" value="0.7">
            <span id="temperature-value" class="settings-value">0.7</span>
          </div>
          <div class="settings-item">
            <label class="settings-label">最大 Token</label>
            <input type="number" id="setting-max-tokens" class="settings-input-number" min="256" max="32768" step="256" value="4096">
          </div>
        </div>

        <!-- 网关 - P0-13: 无API Key字段 -->
        <div class="settings-section">
          <h3 class="settings-section-title">网关</h3>
          <div class="settings-item">
            <span class="settings-label">API 地址</span>
            <span class="settings-value-static">http://127.0.0.1:18789</span>
          </div>
          <div class="settings-item">
            <span class="settings-label">状态</span>
            <span id="settings-gateway-status" class="settings-value-static">检测中...</span>
          </div>
          <div class="settings-note">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            <span>API Key 和模型配置请在终端通过 <code>openclaw config</code> 命令设置。</span>
          </div>
        </div>

        <!-- 记忆 -->
        <div class="settings-section">
          <h3 class="settings-section-title">AI 记忆</h3>
          <div id="memory-panel" style="max-height:200px;overflow-y:auto;font-size:12px;color:var(--t2);"></div>
        </div>

        <!-- 数据 -->
        <div class="settings-section">
          <h3 class="settings-section-title">数据</h3>
          <div class="settings-item">
            <button id="btn-export-data" class="settings-btn">导出对话数据</button>
          </div>
          <div class="settings-item">
            <button id="btn-import-data" class="settings-btn">导入对话数据</button>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <!-- ─── Toast 容器 ──────────────────────────────────── -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ─── 右键菜单 ────────────────────────────────────── -->
  <div id="context-menu" class="context-menu hidden"></div>

  <!-- ─── JS ──────────────────────────────────────────── -->
  <!-- 模块: 按依赖顺序加载 -->
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/gateway.js"></script>
  <script src="js/api.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/search.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/context-menu.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
