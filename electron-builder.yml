# 自由鸟AI Electron Builder 配置
appId: com.ziyouniao.ai
productName: 自由鸟AI
copyright: Copyright © 2024 Ziyouniao Team

directories:
  output: release
  buildResources: assets

files:
  - main.js
  - preload.js
  - src/**/*   # 含 HTML/CSS/JS 全部前端资源，范围保持现状
  - assets/**/*.png
  - assets/**/*.icns

mac:
  # 个人项目，暂不配置 Apple 签名与公证（如需分发请添加 identity/hardenedRuntime/notarize）
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: assets/icon.icns
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"
  darkModeSupport: true

dmg:
  title: "${productName} ${version}"
  background: null
  contents:
    - x: 130
      y: 220
      type: file
      path: /Applications
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 440

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.png
  uninstallerIcon: assets/icon.png
  installerHeaderIcon: assets/icon.png
  shortcutName: 自由鸟AI
  artifactName: "${productName}-${version}-win-setup.${ext}"
